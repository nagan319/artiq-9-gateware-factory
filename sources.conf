# ARTIQ flake source URLs — used by entrypoint.sh via --source=<name>.
# To add a new source, add a case to entrypoint.sh and a URL here.
#
# Pin to a specific commit rev for reproducibility, e.g.:
#   MLABS_FLAKE="git+https://git.m-labs.hk/M-Labs/artiq.git?rev=<COMMIT_HASH>#boards"
# Using ref= below pulls the current branch HEAD (not reproducible across time).

MLABS_FLAKE="git+https://git.m-labs.hk/M-Labs/artiq.git?rev=961551dd29ff7b60116a15cb30643d9e50a0eefb#boards"
UCSB_FLAKE="github:ucsb-amo/artiq/<BRANCH_OR_COMMIT>#boards"
ZYNQ_FLAKE="git+https://git.m-labs.hk/M-Labs/artiq-zynq.git?rev=11b8d2af6d098da4d344b1b3a7866570fdda77ed"
